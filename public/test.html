<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>참여형 무료 와이파이 검증 지도</title>
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=cu551dcr6p&submodules=geocoder"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #map { width: 100%; height: 100%; }
        /* 인포윈도우 스타일 정돈 */
        .iw-container { padding: 15px; min-width: 240px; font-family: 'Malgun Gothic', sans-serif; line-height: 1.5; }
        .iw-title { margin: 0 0 5px 0; font-size: 15px; font-weight: bold; color: #333; }
        .iw-ssid { font-size: 12px; color: #666; margin: 0 0 10px 0; }
        .iw-question { font-size: 13px; font-weight: bold; color: #004ffe; margin: 10px 0; background: #f0f5ff; padding: 8px; border-radius: 4px; border-left: 3px solid #004ffe; }
        .iw-sub { font-size: 11px; color: #888; margin: 0 0 10px 0; }
        .iw-btn { width: 100%; padding: 8px; background: #004ffe; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .iw-btn:hover { background: #003bbb; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // 1. 파이어베이스 설정 및 초기화
        const firebaseConfig = {
            apiKey: "AIzaSyDZT_SerkNiSBhVL7hYH7giIFB7qshIqNs",
            authDomain: "wifimap-852eb.firebaseapp.com",
            databaseURL: "https://wifimap-852eb-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "wifimap-852eb",
            storageBucket: "wifimap-852eb.firebasestorage.app",
            messagingSenderId: "237915873972",
            appId: "1:237915873972:web:511d324850f1600f866de1",
            measurementId: "G-BQBBHGTG3X"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. 지도 초기화
        var map = new naver.maps.Map('map', {
            center: new naver.maps.LatLng(37.3214, 127.0609), 
            zoom: 14
        });

        // 공용 인포윈도우 객체 생성
        var infowindow = new naver.maps.InfoWindow({
            content: ''
        });

        // 3. 현재 위치 GPS 읽기 및 내 위치 마커 표시
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                var lat = position.coords.latitude;
                var lng = position.coords.longitude;
                var currentPos = new naver.maps.LatLng(lat, lng);
                map.setCenter(currentPos);
                
                new naver.maps.Marker({
                    position: currentPos,
                    map: map,
                    title: "현재 내 위치",
                    icon: {
                        content: '<div style="width:14px;height:14px;background:red;border-radius:50%;border:2px solid white;box-shadow:0 0 4px rgba(0,0,0,0.5);"></div>',
                        anchor: new naver.maps.Point(7, 7)
                    }
                });
            });
        }

        // 4. Realtime Database에서 와이파이 지점들 가져와 표시 (한 번 로드)
        db.ref('/').once('value').then((snapshot) => {
            snapshot.forEach((childSnapshot) => {
                const item = childSnapshot.val();
                const key = childSnapshot.key; // DB 내 해당 항목의 고유 키(인덱스)
                
                if (!item) return;

                let placeName = item['설치장소명']; 
                let ssid = item['와이파이SSID'];
                let lat = parseFloat(item['WGS84위도']);
                let lng = parseFloat(item['WGS84경도']);
                // 인증 횟수 데이터가 없으면 기본값 0
                let verifyCount = item['verifyCount'] ? parseInt(item['verifyCount']) : 0;

                if (!isNaN(lat) && !isNaN(lng)) {
                    let position = new naver.maps.LatLng(lat, lng);

                    // [기능 추가] 짙어지는 시각 효과: 인증 횟수가 많을수록 원의 불투명도(fillOpacity)가 진해짐
                    // 기본 0.15에서 시작하여 인증당 0.15씩 증가 (최대 0.85까지 진해짐)
                    let calculatedOpacity = Math.min(0.15 + (verifyCount * 0.15), 0.85);
                    // 인증 횟수가 많아지면 반경도 살짝 넓혀 시각적 강조 효과 부여
                    let calculatedRadius = Math.min(25 + (verifyCount * 5), 60); 

                    // 와이파이 지점을 나타내는 원형 신호 표시
                    let circle = new naver.maps.Circle({
                        map: map,
                        center: position,
                        radius: calculatedRadius,
                        fillColor: '#004ffe',
                        fillOpacity: calculatedOpacity,
                        strokeColor: '#004ffe',
                        strokeOpacity: 0.4,
                        strokeWeight: 1
                    });

                    // 클릭 시 띄울 질문 대화창(인포윈도우) HTML 구성
                    let contentString = [
                        '<div class="iw-container">',
                        '   <div class="iw-title">' + placeName + '</div>',
                        '   <div class="iw-ssid">SSID: ' + (ssid ? ssid : "정보 없음") + '</div>',
                        '   <div class="iw-question">',
                        '       💡 화면 맨 위에 지금 무료 와이파이로 접속하고 계신가요?<br>',
                        '       선택사항으로 WiFi 설정 스크린샷을 준비해 주세요!',
                        '   </div>',
                        '   <div class="iw-sub">상위 알림바 확인 및 검증 동의 참여 (현재 인증: ' + verifyCount + '회)</div>',
                        '   <button class="iw-btn" onclick="window.verifyWiFi(\'' + key + '\', ' + verifyCount + ')">',
                        '       네, 지금 접속 중입니다! (인증)',
                        '   </button>',
                        '</div>'
                    ].join('');

                    // 원 영역이나 중심을 클릭하면 질문 대화창 오픈
                    naver.maps.Event.addListener(circle, 'click', function(e) {
                        infowindow.setContent(contentString);
                        infowindow.open(map, position);
                    });
                }
            });
        }).catch(error => console.error("데이터 로드 실패:", error));

        // 5. [기능 추가] 사용자 동의 및 무료 와이파이 존재여부 검증 함수
        window.verifyWiFi = function(key, currentCount) {
            // 스크린샷 공유 유도 안내창 고도화 (확인/취소 구조)
            let confirmScreenshot = confirm(
                "무료 와이파이 검증에 참여해 주셔서 감사합니다!\n\n" +
                "혹시 상단 바에 와이파이 아이콘이 떠 있다면, 다음 단계 확장을 위해 스마트폰의 'WiFi 설정 화면 스크린샷'을 미리 캡처해 두셨나요?\n\n" +
                "[확인]을 누르면 이 위치의 무료 와이파이 데이터 신뢰도가 상승하며 지도의 표시가 더 짙어집니다."
            );

            if (confirmScreenshot) {
                // 파이어베이스 트랜잭션을 사용하여 동시 다발적 클릭에도 안전하게 카운트 +1 증가
                db.ref('/' + key + '/verifyCount').transaction((count) => {
                    return (count || 0) + 1;
                }, function(error, committed, snapshot) {
                    if (error) {
                        alert("인증 처리 중 오류가 발생했습니다.");
                    } else if (committed) {
                        alert("성공적으로 검증되었습니다! 참여 데이터 반영을 위해 지도를 새로고침합니다.");
                        location.reload(); // 원의 농도를 다시 그리기 위해 새로고침 처리
                    }
                });
            }
        };
    </script>
</body>
</html>
