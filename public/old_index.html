<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>고기리 진출입 실시간 CCTV</title>
<script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=cu551dcr6p&submodules=geocoder"></script>
<style>
  html, body { margin:0; padding:0; height:100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #map { width:100%; height:100vh; }
  
  /* Toss 스타일 디자인 적용 */
  .cctv-label {
    padding: 8px 14px; 
    background: #ffffff; 
    border: 1px solid #e1e4e8;
    border-radius: 12px; 
    font-size: 13px; 
    font-weight: 700; 
    color: #191f24; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    white-space: nowrap;
    text-align: center;
  }
  .cctv-label a { 
    color: #3182f6; 
    text-decoration: none; 
    display: block; 
    margin-top: 4px; 
    font-size: 11px;
  }
</style>
</head>
<body>
<div id="map"></div>
<script>
  const map = new naver.maps.Map('map', { zoom: 14 });
  const cctvList = [
    { id:'57',  name:'고기동 제1경보국', address:'경기도 용인시 수지구 고기동 229-14' },
    { id:'58',  name:'고기동 제2경보국', address:'경기도 용인시 수지구 고기동 755-37' },
    { id:'62',  name:'고기계곡 제3경보국', address:'경기도 용인시 수지구 고기동 755-45' },
    { id:'63',  name:'고기계곡 제4경보국', address:'경기도 용인시 수지구 고기동 755-37' },
    { id:'73',  name:'동막천-고기계곡', address:'경기도 용인시 수지구 고기동 755' },
    { id:'74',  name:'서분당 IC하부', address:'경기도 용인시 수지구 고기동 755-45' },
    { id:'121', name:'고기교', address:'경기도 용인시 수지구 고기동 755-45' },
    { id:'105', name:'말구리고개-2', address:'경기도 용인시 수지구 고기동 340-7' },
    { id:'33',  name:'말구리고개-1', address:'경기도 용인시 수지구 동천동 687-7' },
    { id:'106', name:'말구리고개-3', address:'경기도 용인시 수지구 동천동 689-73' }
  ];

  // 학교 위치 마커
  naver.maps.Service.geocode({ query: '경기 용인시 수지구 고기동 348-1' }, (status, response) => {
    if (status === naver.maps.Service.Status.OK) {
      const pos = new naver.maps.LatLng(response.v2.addresses[0].y, response.v2.addresses[0].x);
      map.setCenter(pos);
      new naver.maps.Marker({
        position: pos, map: map,
        icon: { content: '<img src="images/logo.svg" width="60">', anchor: new naver.maps.Point(30, 30) }
      });
    }
  });

  // CCTV 마커 생성
  cctvList.forEach((cctv, i) => {
    setTimeout(() => {
      naver.maps.Service.geocode({ query: cctv.address }, (status, response) => {
        if (status === naver.maps.Service.Status.OK) {
          const pos = new naver.maps.LatLng(response.v2.addresses[0].y, response.v2.addresses[0].x);
          const link = `http://safe.yongin.go.kr/m/cctv_view.html?cn=${cctv.id}&page=&cd=2&ct=2&ns=`;
          
          new naver.maps.Marker({
            position: pos,
            map: map,
            icon: {
              content: `<div class="cctv-label">${cctv.name}<a href="${link}" target="_blank">영상 보기</a></div>`,
              anchor: new naver.maps.Point(70, 30) // 위치 조정
            }
          });
        }
      });
    }, i * 250);
  });
</script>
</body>
</html>
