<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>고기리 진출입 실시간 CCTV</title>
<script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=cu551dcr6p&submodules=geocoder"></script>
<style>
  html, body { margin:0; padding:0; height:100%; font-family: sans-serif; }
  #map { width:100%; height:100vh; }

  /* 핀 + 이름표를 세로로 쌓는 오버레이. transform으로 핀 끝이 좌표에 정확히 닿게 함 */
  .custom-overlay {
    position: absolute; transform: translate(-50%, -100%);
    display: flex; flex-direction: column; align-items: center;
  }

  /* 항상 보이는 이름표 */
  .label-box {
    margin-bottom: 4px; padding: 6px 10px; background: #ffffff; border: 1px solid #3182f6;
    border-radius: 8px; font-size: 12px; font-weight: 700; color: #191f24;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15); white-space: nowrap;
  }
  .label-box a { color: #3182f6; text-decoration: none; margin-left: 5px; }

  /* 실제 위치를 나타내는 핀(물방울 모양) */
  .pin {
    width: 18px; height: 18px; border-radius: 50% 50% 50% 0;
    background: #3182f6; border: 2px solid #ffffff;
    transform: rotate(-45deg);
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  .pin.school { background: #ff6b4a; width: 22px; height: 22px; }
</style>
</head>
<body>
<div id="map"></div>
<script>
  // 지도가 완전히 로드된 후 시작
  const map = new naver.maps.Map('map', { zoom: 14 });
  const cctvList = [
    { id:'57',  name:'고기동 제1경보국', address:'경기도 용인시 수지구 고기동 229-14' },
    { id:'58',  name:'고기동 제2경보국', address:'경기도 용인시 수지구 고기동 755-37' },
    { id:'62',  name:'고기계곡 제3경보국', address:'경기도 용인시 수지구 고기동 755-45' },
    { id:'63',  name:'고기계곡 제4경보국', address:'경기도 용인시 수지구 고기동 755-37' },
    { id:'73',  name:'동막천-고기계곡', address:'경기도 용인시 수지구 고기동 755' },
    { id:'74',  name:'서분당 IC하부', address:'경기도 용인시 수지구 고기동 755-45' },
    { id:'121', name:'고기교', address:'경기도 용인시 수지구 고기동 755-45' },
    { id:'105', name:'말구리고개-2', address:'경기도 용인시 수지구 고기동 340-7' },
    { id:'33',  name:'말구리고개-1', address:'경기도 용인시 수지구 동천동 687-7' },
    { id:'106', name:'말구리고개-3', address:'경기도 용인시 수지구 동천동 689-73' }
  ];

  // 커스텀 오버레이 생성 함수: 이름표(항상 표시) + 핀을 세로로 쌓음
  function createOverlay(pos, labelHtml, pinClass) {
    new naver.maps.Marker({
      position: pos,
      map: map,
      icon: {
        content: `
          <div class="custom-overlay">
            <div class="label-box">${labelHtml}</div>
            <div class="pin ${pinClass || ''}"></div>
          </div>`,
        anchor: new naver.maps.Point(0, 0)
      }
    });
  }

  // 1. 학교 위치
  naver.maps.Service.geocode({ query: '경기 용인시 수지구 고기동 348-1' }, (status, response) => {
    if (status === naver.maps.Status.OK) {
      const pos = new naver.maps.LatLng(response.v2.addresses[0].y, response.v2.addresses[0].x);
      map.setCenter(pos);
      createOverlay(pos, '수지꿈학교', 'school');
    }
  });

  // 2. CCTV 위치 (지오코딩 요청 과다 방지를 위해 약간의 간격을 두고 순차 호출)
  cctvList.forEach((cctv, i) => {
    setTimeout(() => {
      naver.maps.Service.geocode({ query: cctv.address }, (status, response) => {
        if (status === naver.maps.Status.OK) {
          const pos = new naver.maps.LatLng(response.v2.addresses[0].y, response.v2.addresses[0].x);
          const link = `http://safe.yongin.go.kr/m/cctv_view.html?cn=${cctv.id}&page=&cd=2&ct=2&ns=`;
          createOverlay(pos, `${cctv.name}<a href="${link}" target="_blank">보기</a>`);
        }
      });
    }, i * 200);
  });
</script>
</body>
</html>
