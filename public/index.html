<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>고기리 진출입 실시간 CCTV</title>
<script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=cu551dcr6p&submodules=geocoder"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<style>
  html, body { margin:0; padding:0; height:100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

  /*
    --cctv-font-size: 지도 줌 레벨에 따라 JS(zoom_changed)가 실시간으로 갱신하는
    CSS 변수. 기준값(줌 14)은 10.8px, 줌인/줌아웃에 맞춰 조금씩 커지고 작아짐.
    실제 font-size는 이 값과 "화면 너비의 8%" 중 더 작은 쪽을 쓰므로
    (min() 사용) 어떤 화면 크기·줌 레벨에서도 절대 화면보다 커질 수 없음.
  */
  :root { --cctv-font-size: 32.4px; }

  /* 위치 고정을 위한 래퍼: 크기가 커져도 항상 좌표 지점에 중심이 맞춰지도록
     transform으로 자체 정렬 (anchor는 항상 Point(0,0)).
     핵심 트릭: translateY(-100%)는 "자기 자신의 전체 높이"만큼 위로 이동시키므로,
     아래쪽 spacer + 점의 "바닥"은 라벨 크기와 무관하게 항상 좌표 지점에 고정됨.
     즉 겹침 방지를 위해 라벨을 얼마나 밀어올리든(spacer 높이 조절) 점의 위치는
     절대 변하지 않음. */
  .cctv-overlay {
    position: absolute;
    transform: translate(-50%, -100%);
    display: flex; flex-direction: column; align-items: center;
  }

  .cctv-label {
    display: none; /* 기본은 숨김. 마커 클릭 시에만 보이도록 JS가 전환 */
    padding: 0.5em 0.9em;
    background: #ffffff;
    border: 1px solid #e1e4e8;
    border-radius: 0.6em;
    /* 이중 안전장치: JS가 계산한 값과 화면 너비 8% 중 작은 값 사용 */
    font-size: min(var(--cctv-font-size), 8vw);
    font-weight: 700;
    color: #191f24;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
    line-height: 1.3;
    /* 화면보다 절대 커지지 않도록: 너비 상한 + 높이 상한 + 넘치면 처리 */
    max-width: min(80vw, 640px);
    max-height: 70vh;
    overflow: hidden;
    white-space: normal;
    word-break: keep-all;
    overflow-wrap: break-word;
    box-sizing: border-box;
  }
  .cctv-label a {
    color: #3182f6;
    text-decoration: none;
    display: block;
    margin-top: 0.3em;
    font-size: 0.4em; /* 링크는 이름 대비 상대적으로 작게 유지 */
  }

  @font-face {
    font-family: 'KimNamyun';
    src: url('https://cdn.jsdelivr.net/gh/fontbee/font@main/Yoondesign/KimNamyun.woff') format('woff');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }
  /* 수지꿈학교 이름표만 김남윤체 적용, 폰트 크기는 다른 이름표의 절반 */
  .cctv-label-school {
    font-family: 'KimNamyun', sans-serif;
    font-size: min(calc(var(--cctv-font-size) / 2), 4vw);
  }

  /* 라벨과 점 사이 간격. 겹침 방지 시 이 높이를 JS가 늘려서 라벨을 밀어올림 */
  .cctv-spacer {
    width: 1px;
    height: 4px; /* 기본 간격 */
    flex-shrink: 0;
  }

  /* 실제 좌표 지점을 표시하는 마커 (클래식 지도 핀 모양: 눈물방울 + 가운데 흰 원) */
  .cctv-dot {
    display: block;
    width: 26px; height: 36px;
    color: #ec3a2e; /* svg의 currentColor로 사용 */
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4));
    flex-shrink: 0;
    cursor: pointer;
  }

  /* 수지꿈학교 마커: 점 대신 실제 로고 이미지를 지도 좌표 위에 표시 */
  .cctv-school-logo {
    display: block;
    width: 32px;
    height: 44.6px; /* 로고 원본 비율(631:880) 유지 */
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4));
    flex-shrink: 0;
    cursor: pointer;
  }

  /* 수지꿈학교 로고: 지도 위 마커가 아니라, 화면 하단에 항상 고정되는 오버레이.
     지도를 움직이거나 확대/축소해도 절대 같이 움직이지 않음. */
  #school-logo-fixed {
    position: fixed;
    left: 50%;
    bottom: 16px;
    transform: translateX(-50%);
    height: 56px;
    z-index: 9999;
    pointer-events: none; /* 지도 조작을 막지 않도록 */
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.35));
    transition: opacity 0.2s ease;
  }
  #school-logo-fixed.hidden { opacity: 0; }

  #map {
    width: 100%;
    height: 100vh;
    transition: height 0.25s ease;
  }

  /* 영상 클릭 시 화면 하단에 뜨는 iframe 패널 */
  #video-panel {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: 100vh;
    background: #000;
    z-index: 10000;
    display: flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.25s ease;
    box-shadow: 0 -4px 16px rgba(0,0,0,0.4);
  }
  #video-panel.open { transform: translateY(0); }

  #video-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px;
    background: #191f28;
    color: #ffffff;
    font-size: 14px;
    font-weight: 700;
    flex-shrink: 0;
  }
  #video-panel-header .fallback-link {
    color: #8bb8ff; font-size: 12px; font-weight: 500; text-decoration: none; margin-left: 8px;
  }
  .back-to-map-btn {
    background: #3182f6;
    border: none;
    color: #ffffff;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    margin-left: 8px;
  }
  #video-panel-close {
    background: none; border: none; color: #ffffff;
    font-size: 18px; line-height: 1; cursor: pointer; padding: 4px 8px;
  }
  #video-panel video {
    flex: 1; width: 100%; height: 100%; border: none; background: #000;
    object-fit: contain;
  }
</style>
</head>
<body>
<div id="map"></div>
<img id="school-logo-fixed" src="images/logo.svg" alt="수지꿈학교 로고" />

<div id="video-panel">
  <div id="video-panel-header">
    <span style="display:flex; align-items:center; margin-left:auto;">
      <a id="video-panel-fallback" class="fallback-link" href="#" target="_blank">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px; margin-right:3px;"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14 21 3"/></svg>새 창에서 열기
      </a>
      <button id="video-panel-back" class="back-to-map-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px; margin-right:4px;"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>처음 지도로 돌아가기
      </button>
      <button id="video-panel-close" aria-label="닫기">✕</button>
    </span>
  </div>
  <video id="video-panel-video" playsinline controls></video>
</div>
<script>
  const BASE_ZOOM = 14;
  const BASE_FONT_PX = 32.4; // 이전 10.8px의 3배
  const MIN_FONT_PX = 15.9;
  const MAX_FONT_PX = 69.9;
  const BASE_GAP_PX = 4;

  const map = new naver.maps.Map('map', { zoom: BASE_ZOOM });

  // ---- 하단 영상 패널: 클릭 시 새 창 대신 화면 아래에서 실제 스트림(.m3u8)을 재생 ----
  const videoPanel = document.getElementById('video-panel');
  const videoEl = document.getElementById('video-panel-video');
  const videoFallback = document.getElementById('video-panel-fallback');
  const videoCloseBtn = document.getElementById('video-panel-close');
  const videoBackBtn = document.getElementById('video-panel-back');
  const schoolLogoEl = document.getElementById('school-logo-fixed');
  const mapEl = document.getElementById('map');

  let hlsInstance = null;

  function resizeMapAfterPanelChange() {
    // 컨테이너 크기 변경(transition) 이후 지도가 새 크기를 인식하도록 트리거
    setTimeout(() => {
      naver.maps.Event.trigger(map, 'resize');
      if (openLabelIdx !== null) {
        requestAnimationFrame(() => requestAnimationFrame(fitOpenLabel));
      }
    }, 260);
  }

  // 용인시 재난CCTV 스트림 URL 패턴: http://{host}.yongin.go.kr:1935/live/ch{번호}_s.stream/playlist.m3u8
  // 카메라마다 실제 연결된 스트리밍 서버(host)가 safe2 또는 safe로 서로 달라서
  // safe2로 먼저 시도해보고, 에러가 나면 자동으로 safe로 재시도한다.
  const STREAM_HOSTS = ['safe2', 'safe'];

  function buildStreamUrl(cn, host) {
    return `http://${host}.yongin.go.kr:1935/live/ch${cn}_s.stream/playlist.m3u8`;
  }

  // 현재 재생 시도 중인 카메라 번호(다른 카메라로 넘어갔는데 이전 재시도가
  // 뒤늦게 도착해 덮어쓰는 것을 막기 위한 가드용)
  let currentPlayCn = null;

  function attachErrorFallback(cn, hostIndex) {
    const nextHostIndex = hostIndex + 1;
    if (nextHostIndex >= STREAM_HOSTS.length) return; // 더 시도할 host가 없음
    tryPlayWithHost(cn, nextHostIndex);
  }

  function tryPlayWithHost(cn, hostIndex) {
    const host = STREAM_HOSTS[hostIndex];
    const streamUrl = buildStreamUrl(cn, host);

    if (hlsInstance) {
      hlsInstance.destroy();
      hlsInstance = null;
    }
    videoEl.pause();
    videoEl.removeAttribute('src');
    videoEl.load();

    if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
      // Safari/iOS는 HLS를 네이티브로 지원
      const onNativeError = () => {
        videoEl.removeEventListener('error', onNativeError);
        if (currentPlayCn === cn) attachErrorFallback(cn, hostIndex);
      };
      videoEl.addEventListener('error', onNativeError, { once: true });
      videoEl.src = streamUrl;
      videoEl.play().catch(() => {});
    } else if (window.Hls && window.Hls.isSupported()) {
      hlsInstance = new Hls();
      hlsInstance.loadSource(streamUrl);
      hlsInstance.attachMedia(videoEl);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
        videoEl.play().catch(() => {});
      });
      hlsInstance.on(Hls.Events.ERROR, (event, data) => {
        if (data.fatal && currentPlayCn === cn) {
          attachErrorFallback(cn, hostIndex);
        }
      });
    }
  }

  function playStream(cn) {
    currentPlayCn = cn;
    tryPlayWithHost(cn, 0);
  }

  function stopStream() {
    currentPlayCn = null;
    if (hlsInstance) {
      hlsInstance.destroy();
      hlsInstance = null;
    }
    videoEl.pause();
    videoEl.removeAttribute('src');
    videoEl.load();
  }

  function openVideoPanel(name, fallbackUrl, cn) {
    videoFallback.href = fallbackUrl; // "새 창에서 열기"는 원래 용인시청 페이지로 연결
    playStream(cn);
    videoPanel.classList.add('open');
    schoolLogoEl.classList.add('hidden');
    mapEl.style.height = '0px';
    resizeMapAfterPanelChange();
  }

  function closeVideoPanel() {
    videoPanel.classList.remove('open');
    stopStream(); // 영상/오디오 정지
    schoolLogoEl.classList.remove('hidden');
    mapEl.style.height = '100vh';
    resizeMapAfterPanelChange();
  }

  videoCloseBtn.addEventListener('click', closeVideoPanel);
  videoBackBtn.addEventListener('click', closeVideoPanel);

  // 이름표 안의 "영상 보기" 링크는 동적으로 생성되므로, 문서 전체에 위임해서 클릭을 감지
  document.addEventListener('click', (e) => {
    const link = e.target.closest('.video-link');
    if (!link) return;
    e.preventDefault();
    e.stopPropagation(); // 마커 클릭(이름표 토글)과 겹치지 않도록
    openVideoPanel(link.dataset.name, link.dataset.url, link.dataset.cn);
  });

  // 학교 이름표의 인스타그램 링크는 새 탭으로 정상 이동시키되,
  // 마커 클릭(이름표 토글)과 겹치지 않도록 버블링만 막음
  document.addEventListener('click', (e) => {
    const link = e.target.closest('.school-link');
    if (!link) return;
    e.stopPropagation();
  });

  // 줌 레벨이 바뀔 때마다 이름표 글자 크기를 같이 조정
  function updateLabelSize() {
    const zoom = map.getZoom();
    let size = BASE_FONT_PX * Math.pow(1.15, zoom - BASE_ZOOM);
    size = Math.max(MIN_FONT_PX, Math.min(MAX_FONT_PX, size));
    document.documentElement.style.setProperty('--cctv-font-size', size.toFixed(1) + 'px');
  }

  // 생성된 모든 마커 정보를 모아두고, 이름표 토글 시 사용
  const placedMarkers = []; // { pos, idx, isSchool }
  let pendingGeocodes = 0;
  let markerSeq = 0;

  // 현재 열려 있는(이름표가 보이는) 마커 idx. 한 번에 하나만 열리도록 관리.
  let openLabelIdx = null;

  function closeAllLabels() {
    placedMarkers.forEach((m) => {
      const el = document.getElementById('cctv-label-' + m.idx);
      if (el) {
        el.style.display = 'none';
        // 다음에 다시 열릴 때 원래 크기/위치부터 새로 계산하도록 초기화
        el.style.fontSize = '';
        el.style.transform = '';
      }
    });
    openLabelIdx = null;
  }

  function toggleLabel(idx) {
    const labelEl = document.getElementById('cctv-label-' + idx);
    if (!labelEl) return;
    const wasOpen = openLabelIdx === idx;
    closeAllLabels();
    if (!wasOpen) {
      labelEl.style.display = 'block';
      openLabelIdx = idx;
      // 표시된 다음 프레임에 화면 안에 맞도록 크기/위치를 계산
      requestAnimationFrame(() => requestAnimationFrame(fitOpenLabel));
    }
  }

  // 이름표를 화면(뷰포트) 안에 맞추는 함수.
  // 1) 원래 크기로 그려본 뒤 화면보다 크면 폰트를 15%씩, 최대 6단계, 최소 10px까지 줄임
  // 2) 그 다음 화면 밖으로 삐져나온 만큼만 이름표를 안쪽으로 이동 (점 위치는 그대로 둠)
  const LABEL_FIT_MAX_STEPS = 6;
  const LABEL_FIT_SHRINK_RATIO = 0.85; // 15%씩 축소
  const LABEL_FIT_MIN_FONT_PX = 10;

  function fitOpenLabel() {
    if (openLabelIdx === null) return;
    const labelEl = document.getElementById('cctv-label-' + openLabelIdx);
    if (!labelEl || labelEl.style.display === 'none') return;

    // 1) 원래 크기(인라인 스타일 초기화)부터 다시 시작
    labelEl.style.transform = '';
    labelEl.style.fontSize = '';

    // 2) 화면보다 크면 단계적으로 폰트 축소
    for (let step = 0; step < LABEL_FIT_MAX_STEPS; step++) {
      const rect = labelEl.getBoundingClientRect();
      const fitsWidth = rect.width <= window.innerWidth;
      const fitsHeight = rect.height <= window.innerHeight;
      if (fitsWidth && fitsHeight) break;

      const currentPx = parseFloat(getComputedStyle(labelEl).fontSize);
      const nextPx = Math.max(LABEL_FIT_MIN_FONT_PX, currentPx * LABEL_FIT_SHRINK_RATIO);
      labelEl.style.fontSize = nextPx + 'px';
      if (nextPx <= LABEL_FIT_MIN_FONT_PX) break; // 이미 최소 크기
    }

    // 3) 화면 밖으로 나간 만큼만 안쪽으로 이동 (점은 영향받지 않음)
    const EDGE_MARGIN = 4; // 화면 끝에 딱 붙지 않도록 약간의 여백
    const rect2 = labelEl.getBoundingClientRect();

    let dx = 0;
    if (rect2.right + dx > window.innerWidth - EDGE_MARGIN) {
      dx += (window.innerWidth - EDGE_MARGIN) - (rect2.right + dx);
    }
    if (rect2.left + dx < EDGE_MARGIN) {
      dx += EDGE_MARGIN - (rect2.left + dx);
    }

    let dy = 0;
    if (rect2.bottom + dy > window.innerHeight - EDGE_MARGIN) {
      dy += (window.innerHeight - EDGE_MARGIN) - (rect2.bottom + dy);
    }
    if (rect2.top + dy < EDGE_MARGIN) {
      dy += EDGE_MARGIN - (rect2.top + dy);
    }

    if (dx !== 0 || dy !== 0) {
      labelEl.style.transform = `translate(${dx}px, ${dy}px)`;
    }
  }

  // 창 크기 변경 시, 열려 있는 이름표가 있으면 다시 계산
  window.addEventListener('resize', () => {
    requestAnimationFrame(() => requestAnimationFrame(fitOpenLabel));
  });

  function placeMarker(pos, labelHtml, isSchool) {
    const idx = markerSeq++;
    // 수지꿈학교는 점 대신 실제 로고 이미지, 나머지 CCTV는 콩알탄 모양(가운데 둥근 알맹이 + 양쪽 비틀린 종이 끝)
    const markerGraphic = isSchool
      ? `<img class="cctv-school-logo" src="images/logo.svg" alt="수지꿈학교 로고" />`
      : `
      <svg class="cctv-dot" viewBox="0 0 24 34" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 0C5.373 0 0 5.373 0 12c0 9 12 22 12 22s12-13 12-22c0-6.627-5.373-12-12-12z" fill="currentColor"/>
        <circle cx="12" cy="12" r="5" fill="#ffffff"/>
      </svg>`;
    const labelClass = `cctv-label${isSchool ? ' cctv-label-school' : ''}`;
    const marker = new naver.maps.Marker({
      position: pos,
      map: map,
      icon: {
        content: `
          <div class="cctv-overlay">
            <div class="${labelClass}" id="cctv-label-${idx}">${labelHtml}</div>
            <div class="cctv-spacer" id="cctv-spacer-${idx}"></div>
            ${markerGraphic}
          </div>`,
        anchor: new naver.maps.Point(0, 0)
      }
    });
    // 마커(점) 클릭 시 해당 이름표만 보이도록 토글
    naver.maps.Event.addListener(marker, 'click', () => toggleLabel(idx));
    placedMarkers.push({ pos, idx, isSchool });
  }

  // 지도 이동/줌이 끝날 때마다 이름표 글자 크기 갱신 + 열려있는 이름표 재계산
  naver.maps.Event.addListener(map, 'idle', () => {
    updateLabelSize();
    if (openLabelIdx !== null) {
      requestAnimationFrame(() => requestAnimationFrame(fitOpenLabel));
    }
  });

  // 드래그로 지도를 움직이는 도중에도(끝나기 전에) 실시간으로 이름표가
  // 화면을 벗어나지 않도록 계속 재계산
  naver.maps.Event.addListener(map, 'drag', () => {
    if (openLabelIdx !== null) {
      requestAnimationFrame(fitOpenLabel);
    }
  });

  // 확대/축소가 진행되는 도중에도 실시간으로 재계산
  naver.maps.Event.addListener(map, 'zoom_changed', () => {
    if (openLabelIdx !== null) {
      requestAnimationFrame(fitOpenLabel);
    }
  });

  updateLabelSize();

  const cctvList = [
    { id:'57',  name:'고기동 제1경보국', address:'경기도 용인시 수지구 고기동 229-14' }, // lat:37.368686, lng:127.050478
    { id:'62',  name:'고기계곡 제3경보국', address:'경기도 용인시 수지구 고기동 755-45' }, // lat:37.359913, lng:127.055148
    { id:'63',  name:'고기계곡 제4경보국', address:'경기도 용인시 수지구 고기동 755-37' }, // lat:37.367096, lng:127.050518
    { id:'74',  name:'서분당 IC하부', address:'경기도 용인시 수지구 고기동 755-45' }, // lat:37.35993, lng:127.064237
    { id:'121', name:'고기교', address:'경기도 용인시 수지구 고기동 755-73' }, // lat:37.359094, lng:127.067105
    { id:'105', name:'말구리고개-2', address:'경기도 용인시 수지구 고기동 340-7' }, // lat:37.362705, lng:127.067645
    { id:'33',  name:'말구리고개-1', address:'경기도 용인시 수지구 동천동 687-7' }, // lat:37.357117, lng:127.072535
    { id:'106', name:'말구리고개-3', address:'경기도 용인시 수지구 동천동 689-73' } // lat:37.364376, lng:127.066496
  ];

  const TOTAL_EXPECTED = cctvList.length + 1; // CCTV 8곳 + 학교 1곳
  function onGeocodeSettled() {
    pendingGeocodes++;
  }

  // 학교 위치 마커 (이름표 안에 인스타그램 링크 포함)
  naver.maps.Service.geocode({ query: '경기도 용인시 수지구 고기동 347-30' }, (status, response) => {
    if (status === naver.maps.Service.Status.OK) {
      const pos = new naver.maps.LatLng(response.v2.addresses[0].y, response.v2.addresses[0].x);
      map.setCenter(pos);
      placeMarker(
        pos,
        `수지꿈학교<a href="https://www.instagram.com/sujiggumhaggyo/" class="school-link" target="_blank" rel="noopener">인스타그램</a>`,
        true
      );
    }
    onGeocodeSettled();
  });

  // CCTV 마커 생성
  cctvList.forEach((cctv, i) => {
    setTimeout(() => {
      naver.maps.Service.geocode({ query: cctv.address }, (status, response) => {
        if (status === naver.maps.Service.Status.OK) {
          const pos = new naver.maps.LatLng(response.v2.addresses[0].y, response.v2.addresses[0].x);
          const link = `http://safe.yongin.go.kr/m/cctv_view.html?cn=${cctv.id}&page=&cd=2&ct=2&ns=`;
          placeMarker(pos, `${cctv.name}<a href="${link}" class="video-link" data-url="${link}" data-name="${cctv.name}" data-cn="${cctv.id}">영상 보기</a>`, false);
        }
        onGeocodeSettled();
      });
    }, i * 250);
  });
</script>
