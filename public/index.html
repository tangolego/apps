<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>고기리 진출입 실시간 CCTV</title>
<script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=cu551dcr6p"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<style>
  html, body { margin:0; padding:0; height:100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  :root { --cctv-font-size: 64.8px; }
  .cctv-overlay { position: absolute; transform: translate(-50%, -100%); display: flex; flex-direction: column; align-items: center; }
  .cctv-label { display: none; padding: 0.5em 0.9em; background: #ffffff; border: 1px solid #e1e4e8; border-radius: 0.6em; font-size: min(var(--cctv-font-size), 16vw); font-weight: 700; color: #191f24; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; line-height: 1.3; max-width: min(80vw, 640px); max-height: 70vh; overflow: hidden; white-space: normal; word-break: keep-all; overflow-wrap: break-word; box-sizing: border-box; }
  .cctv-label a { color: #3182f6; text-decoration: none; display: block; margin-top: 0.3em; font-size: 0.4em; }
  @font-face { font-family: 'KimNamyun'; src: url('https://cdn.jsdelivr.net/gh/fontbee/font@main/Yoondesign/KimNamyun.woff') format('woff'); font-weight: normal; font-style: normal; font-display: swap; }
  .cctv-label-school { font-family: 'KimNamyun', sans-serif; font-size: min(calc(var(--cctv-font-size) / 2), 8vw); }
  .cctv-spacer { width: 1px; height: 4px; flex-shrink: 0; }
  .cctv-dot { display: block; width: 26px; height: 36px; color: #ec3a2e; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4)); flex-shrink: 0; cursor: pointer; }
  .cctv-school-logo { display: block; width: 32px; height: 44.6px; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4)); flex-shrink: 0; cursor: pointer; }
  #school-logo-fixed { position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%); height: 56px; z-index: 9999; pointer-events: none; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.35)); transition: opacity 0.2s ease; }
  #school-logo-fixed.hidden { opacity: 0; }
  #map { width: 100%; height: 100vh; height: 100dvh; transition: height 0.25s ease; }
  #video-panel { position: fixed; left: 0; right: 0; bottom: 0; height: 100vh; height: 100dvh; background: #000; z-index: 10000; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.25s ease; box-shadow: 0 -4px 16px rgba(0,0,0,0.4); }
  #video-panel.open { transform: translateY(0); }
  #video-panel-header { display: flex; align-items: center; justify-content: flex-end; row-gap: 6px; column-gap: 4px; padding: 8px 12px; background: #191f28; color: #ffffff; font-size: 14px; font-weight: 700; flex-shrink: 0; }
  .back-to-map-btn { background: #3182f6; border: none; color: #ffffff; font-size: 12px; font-weight: 700; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
  #video-panel-close { background: none; border: none; color: #ffffff; font-size: 18px; line-height: 1; cursor: pointer; padding: 4px 8px; }
  #video-panel video { flex: 1; width: 100%; height: 100%; border: none; background: #000; object-fit: contain; }
  #video-unmute-btn { position: absolute; right: 14px; bottom: 14px; z-index: 10001; width: 40px; height: 40px; border-radius: 50%; border: none; background: rgba(0,0,0,0.55); color: #ffffff; font-size: 18px; cursor: pointer; }
</style>
</head>
<body>
<div id="map"></div>
<img id="school-logo-fixed" src="images/logo.svg" alt="수지꿈학교 로고" />
<div id="video-panel">
  <div id="video-panel-header">
    <button id="video-panel-back" class="back-to-map-btn">처음 지도로 돌아가기</button>
    <button id="video-panel-close">✕</button>
  </div>
  <video id="video-panel-video" playsinline muted controls></video>
  <button id="video-unmute-btn">🔇</button>
</div>
<script>
  const map = new naver.maps.Map('map', { zoom: 14 });
  const videoPanel = document.getElementById('video-panel'), videoEl = document.getElementById('video-panel-video'), schoolLogoEl = document.getElementById('school-logo-fixed'), mapEl = document.getElementById('map');
  
  function placeMarker(pos, labelHtml, isSchool) {
    new naver.maps.Marker({
      position: pos, map: map,
      icon: { content: `<div class="cctv-overlay"><div class="cctv-label${isSchool ? ' cctv-label-school' : ''}">${labelHtml}</div><div class="cctv-spacer"></div>${isSchool ? '<img class="cctv-school-logo" src="images/logo.svg"/>' : '<svg class="cctv-dot" viewBox="0 0 24 34"><path d="M12 0C5.373 0 0 5.373 0 12c0 9 12 22 12 22s12-13 12-22c0-6.627-5.373-12-12-12z" fill="currentColor"/><circle cx="12" cy="12" r="5" fill="#ffffff"/></svg>'}</div>`, anchor: new naver.maps.Point(0, 0) }
    });
  }

  // 학교 위치 직접 지정
  const schoolPos = new naver.maps.LatLng(37.345163, 127.059279);
  map.setCenter(schoolPos);
  placeMarker(schoolPos, '수지꿈학교', true);

  // CCTV 마커 직접 생성
  const cctvList = [
    { id:'57',  name:'고기동 제1경보국',   lat:37.368686, lng:127.050478 },
    { id:'62',  name:'고기계곡 제3경보국', lat:37.359913, lng:127.055148 },
    { id:'63',  name:'고기계곡 제4경보국', lat:37.367096, lng:127.050518 },
    { id:'74',  name:'서분당 IC하부',      lat:37.359930, lng:127.064237 },
    { id:'121', name:'고기교',             lat:37.359094, lng:127.067105 },
    { id:'105', name:'말구리고개-2',       lat:37.362705, lng:127.067645 },
    { id:'33',  name:'말구리고개-1',       lat:37.345115, lng:127.059211 },
    { id:'106', name:'말구리고개-3',       lat:37.364376, lng:127.066496 }
  ];

  cctvList.forEach(cctv => {
    placeMarker(new naver.maps.LatLng(cctv.lat, cctv.lng), `${cctv.name}<a href="http://safe.yongin.go.kr/m/cctv_view.html?cn=${cctv.id}">영상 보기</a>`, false);
  });
</script>
</body>
</html>
