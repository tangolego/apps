<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>실시간 CCTV 전체 현황</title>
<script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=cu551dcr6p&submodules=geocoder"></script>
<style>
  html,body{ margin:0; padding:0; height:100%; background:#0b0f0e; font-family: sans-serif; }
  #map{ width:100%; height:100vh; }
  
  /* 이름표(정보창) 스타일 */
  .info-window { 
    padding:4px 8px; 
    background: rgba(255, 255, 255, 0.95); 
    border: 1px solid #333; 
    border-radius: 4px; 
    font-size: 11px;
    font-weight: bold;
    color: #000;
    text-align: center;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
  }
  .info-window a { color: #d32f2f; text-decoration: none; font-size: 10px; display: block; margin-top: 2px; }
</style>
</head>
<body>

<div id="map"></div>

<script>
  const cctvList = [
    { id:'57',  name:'고기동 제1경보국',   address:'경기도 용인시 수지구 고기동 229-14' },
    { id:'58',  name:'고기동 제2경보국',   address:'경기도 용인시 수지구 고기동 755-37' },
    { id:'62',  name:'고기계곡 제3경보국', address:'경기도 용인시 수지구 고기동 755-45' },
    { id:'63',  name:'고기계곡 제4경보국', address:'경기도 용인시 수지구 고기동 755-37' },
    { id:'73',  name:'동막천-고기계곡',    address:'경기도 용인시 수지구 고기동 755' },
    { id:'74',  name:'서분당 IC하부',      address:'경기도 용인시 수지구 고기동 755-45' },
    { id:'121', name:'고기교',             address:'경기도 용인시 수지구 고기동 755-45' },
    { id:'105', name:'말구리고개-2',       address:'경기도 용인시 수지구 고기동 340-7' },
    { id:'33',  name:'말구리고개-1',       address:'경기도 용인시 수지구 동천동 687-7' },
    { id:'106', name:'말구리고개-3',       address:'경기도 용인시 수지구 동천동 689-73' }
  ];

  // 수지꿈학교 중심 초기화
  naver.maps.Service.geocode({ query: '경기 용인시 수지구 고기동 348-1' }, (status, response) => {
    const center = status === naver.maps.Service.Status.OK 
                   ? new naver.maps.LatLng(response.v2.addresses[0].y, response.v2.addresses[0].x)
                   : new naver.maps.LatLng(37.3010, 127.0790);

    const map = new naver.maps.Map('map', { center: center, zoom: 15 });

    cctvList.forEach(cctv => {
      naver.maps.Service.geocode({ query: cctv.address }, (status, response) => {
        if (status === naver.maps.Service.Status.OK) {
          const pos = new naver.maps.LatLng(response.v2.addresses[0].y, response.v2.addresses[0].x);
          
          const marker = new naver.maps.Marker({
            position: pos,
            map: map
          });

          const infoWindow = new naver.maps.InfoWindow({
            content: `<div class="info-window">${cctv.name}<br><a href="http://safe.yongin.go.kr/m/cctv_view.html?cn=${cctv.id}&page=&cd=2&ct=2&ns=" target="_blank">[영상 바로가기]</a></div>`,
            borderWidth: 0,
            disableAnchor: true,
            backgroundColor: 'transparent'
          });

          // 항상 표시
          infoWindow.open(map, marker);

          // 클릭 시에도 항상 표시 유지
          naver.maps.Event.addListener(marker, 'click', () => {
            infoWindow.open(map, marker);
          });
        }
      });
    });
  });
</script>
</body>
</html>
