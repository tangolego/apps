<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현재 위치 · CCTV</title>
<script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=cu551dcr6p&submodules=geocoder"></script>
<style>
  :root{ --bg: #0b0f0e; --panel: #10201a; --line: #1f3a2e; --accent: #4ee6a6; }
  html,body{ margin:0; padding:0; height:100%; background:var(--bg); color:#d9f3e6; font-family: monospace; }
  #map{ width:100%; height:100vh; }
</style>
</head>
<body>

<div id="map"></div>

<script>
  const cctvList = [
    { id:'ch57',  name:'고기동 제1경보국',   address:'경기도 용인시 수지구 고기동 229-14' },
    { id:'ch58',  name:'고기동 제2경보국',   address:'경기도 용인시 수지구 고기동 755-37' },
    { id:'ch62',  name:'고기계곡 제3경보국', address:'경기도 용인시 수지구 고기동 755-45' },
    { id:'ch63',  name:'고기계곡 제4경보국', address:'경기도 용인시 수지구 고기동 755-37' },
    { id:'ch73',  name:'동막천-고기계곡',    address:'경기도 용인시 수지구 고기동 755' },
    { id:'ch74',  name:'서분당 IC하부',      address:'경기도 용인시 수지구 고기동 755-45' },
    { id:'ch121', name:'고기교',             address:'경기도 용인시 수지구 고기동 755-45' },
    { id:'ch105', name:'말구리고개-2',       address:'경기도 용인시 수지구 고기동 340-7' },
    { id:'ch33',  name:'말구리고개-1',       address:'경기도 용인시 수지구 동천동 687-7' },
    { id:'ch106', name:'말구리고개-3',       address:'경기도 용인시 수지구 동천동 689-73' }
  ];

  const map = new naver.maps.Map('map', {
    center: new naver.maps.LatLng(37.3010, 127.0790),
    zoom: 14
  });

  // 주소 기반 마커 생성 함수
  function createMarker(cctv) {
    naver.maps.Service.geocode({ query: cctv.address }, (status, response) => {
      if (status === naver.maps.Service.Status.OK && response.v2.addresses.length > 0) {
        const item = response.v2.addresses[0];
        const marker = new naver.maps.Marker({
          position: new naver.maps.LatLng(item.y, item.x),
          map: map,
          title: cctv.name
        });

        const infoWindow = new naver.maps.InfoWindow({
          content: `<div style="padding:10px;"><b>${cctv.name}</b><br>${cctv.address}</div>`
        });

        naver.maps.Event.addListener(marker, 'click', () => {
          infoWindow.open(map, marker);
        });
      }
    });
  }

  // 모든 CCTV에 대해 마커 생성 실행
  cctvList.forEach(cctv => createMarker(cctv));
</script>
</body>
</html>
