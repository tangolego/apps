<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>고기리 진출입 실시간 CCTV</title>
<script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=cu551dcr6p&submodules=geocoder"></script>
<style>
  html, body { margin:0; padding:0; height:100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #map { width:100%; height:100vh; }

  /*
    --cctv-font-size: 지도 줌 레벨에 따라 JS(zoom_changed)가 실시간으로 갱신하는
    CSS 변수. 기준값(줌 14)은 10.8px, 줌인/줌아웃에 맞춰 조금씩 커지고 작아짐.
    실제 font-size는 이 값과 "화면 너비의 8%" 중 더 작은 쪽을 쓰므로
    (min() 사용) 어떤 화면 크기·줌 레벨에서도 절대 화면보다 커질 수 없음.
  */
  :root { --cctv-font-size: 32.4px; }

  /* 위치 고정을 위한 래퍼: 크기가 커져도 항상 좌표 지점에 중심이 맞춰지도록
     transform으로 자체 정렬 (anchor는 항상 Point(0,0)).
     핵심 트릭: translateY(-100%)는 "자기 자신의 전체 높이"만큼 위로 이동시키므로,
     아래쪽 spacer + 점의 "바닥"은 라벨 크기와 무관하게 항상 좌표 지점에 고정됨.
     즉 겹침 방지를 위해 라벨을 얼마나 밀어올리든(spacer 높이 조절) 점의 위치는
     절대 변하지 않음. */
  .cctv-overlay {
    position: absolute;
    transform: translate(-50%, -100%);
    display: flex; flex-direction: column; align-items: center;
  }

  .cctv-label {
    padding: 0.5em 0.9em;
    background: #ffffff;
    border: 1px solid #e1e4e8;
    border-radius: 0.6em;
    /* 이중 안전장치: JS가 계산한 값과 화면 너비 8% 중 작은 값 사용 */
    font-size: min(var(--cctv-font-size), 8vw);
    font-weight: 700;
    color: #191f24;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    text-align: center;
    line-height: 1.3;
    /* 화면보다 절대 커지지 않도록: 너비 상한 + 높이 상한 + 넘치면 처리 */
    max-width: min(80vw, 640px);
    max-height: 70vh;
    overflow: hidden;
    white-space: normal;
    word-break: keep-all;
    overflow-wrap: break-word;
    box-sizing: border-box;
  }
  .cctv-label a {
    color: #3182f6;
    text-decoration: none;
    display: block;
    margin-top: 0.3em;
    font-size: 0.4em; /* 링크는 이름 대비 상대적으로 작게 유지 */
  }

  /* 라벨과 점 사이 간격. 겹침 방지 시 이 높이를 JS가 늘려서 라벨을 밀어올림 */
  .cctv-spacer {
    width: 1px;
    height: 4px; /* 기본 간격 */
    flex-shrink: 0;
  }

  /* 실제 좌표 지점을 표시하는 마커 점 (CCTV 공통) */
  .cctv-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #3182f6; border: 2px solid #ffffff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    flex-shrink: 0;
  }

  .cctv-dot.school { background: #ff6b4a; width: 14px; height: 14px; }

  /* 수지꿈학교 로고: 지도 위 마커가 아니라, 화면 하단에 항상 고정되는 오버레이.
     지도를 움직이거나 확대/축소해도 절대 같이 움직이지 않음. */
  #school-logo-fixed {
    position: fixed;
    left: 50%;
    bottom: 16px;
    transform: translateX(-50%);
    height: 56px;
    z-index: 9999;
    pointer-events: none; /* 지도 조작을 막지 않도록 */
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.35));
  }
</style>
</head>
<body>
<div id="map"></div>
<img id="school-logo-fixed" src="images/logo.svg" alt="수지꿈학교 로고" />
<script>
  const BASE_ZOOM = 14;
  const BASE_FONT_PX = 32.4; // 이전 10.8px의 3배
  const MIN_FONT_PX = 15.9;
  const MAX_FONT_PX = 69.9;
  const BASE_GAP_PX = 4;

  const map = new naver.maps.Map('map', { zoom: BASE_ZOOM });

  // 줌 레벨이 바뀔 때마다 이름표 글자 크기를 같이 조정
  function updateLabelSize() {
    const zoom = map.getZoom();
    let size = BASE_FONT_PX * Math.pow(1.15, zoom - BASE_ZOOM);
    size = Math.max(MIN_FONT_PX, Math.min(MAX_FONT_PX, size));
    document.documentElement.style.setProperty('--cctv-font-size', size.toFixed(1) + 'px');
  }

  // 생성된 모든 마커 정보를 모아두고, 겹침 해소 시 사용
  const placedMarkers = []; // { pos, idx, isSchool }
  let pendingGeocodes = 0;
  let markerSeq = 0;
  let rotationTimers = []; // 겹치는 그룹의 번갈아-표시 타이머들

  function placeMarker(pos, labelHtml, isSchool) {
    const idx = markerSeq++;
    const markerGraphic = `<div class="cctv-dot ${isSchool ? 'school' : ''}"></div>`;
    new naver.maps.Marker({
      position: pos,
      map: map,
      icon: {
        content: `
          <div class="cctv-overlay">
            <div class="cctv-label" id="cctv-label-${idx}">${labelHtml}</div>
            <div class="cctv-spacer" id="cctv-spacer-${idx}"></div>
            ${markerGraphic}
          </div>`,
        anchor: new naver.maps.Point(0, 0)
      }
    });
    placedMarkers.push({ pos, idx, isSchool });
  }

  // 서로 겹치는 이름표들은 하나의 "그룹"으로 묶어서, 그룹 안에서 2초마다
  // 한 번에 하나씩만 번갈아 보이게 함. 겹치지 않는 이름표는 항상 그대로 표시.
  // 점/로고(정확한 위치 표시)는 이 처리와 무관하게 항상 그대로 유지됨.
  function resolveOverlaps() {
    // 이전 회차의 번갈아-표시 타이머들 정리
    rotationTimers.forEach((t) => clearInterval(t));
    rotationTimers = [];

    if (placedMarkers.length === 0) return;
    const projection = map.getProjection();

    // 1) 각 라벨을 기본 간격(BASE_GAP_PX)에 뒀을 때의 화면상 사각형 계산
    const items = [];
    placedMarkers.forEach((m) => {
      const labelEl = document.getElementById('cctv-label-' + m.idx);
      const spacerEl = document.getElementById('cctv-spacer-' + m.idx);
      if (!labelEl || !spacerEl) return; // 아직 렌더링 전이면 건너뜀

      spacerEl.style.height = BASE_GAP_PX + 'px';
      labelEl.style.display = ''; // 일단 모두 보이는 상태로 리셋 후 크기 측정

      const pt = projection.fromCoordToOffset(m.pos);
      const graphicSize = m.isSchool ? 44 : 14;
      const rect = labelEl.getBoundingClientRect();
      const bottom = pt.y - graphicSize - BASE_GAP_PX;
      const top = bottom - rect.height;
      const left = pt.x - rect.width / 2;
      const right = pt.x + rect.width / 2;

      items.push({ labelEl, left, right, top, bottom, group: -1 });
    });

    // 2) 겹치는 것끼리 그룹으로 묶기 (연결된 겹침 = 같은 그룹, Union-Find)
    const n = items.length;
    const parent = Array.from({ length: n }, (_, i) => i);
    function find(x) { return parent[x] === x ? x : (parent[x] = find(parent[x])); }
    function union(a, b) { const ra = find(a), rb = find(b); if (ra !== rb) parent[ra] = rb; }

    for (let i = 0; i < n; i++) {
      for (let j = i + 1; j < n; j++) {
        const a = items[i], b = items[j];
        const overlap = a.left < b.right && a.right > b.left && a.top < b.bottom && b.bottom > a.top;
        if (overlap) union(i, j);
      }
    }

    const groups = new Map(); // root -> [item, ...]
    items.forEach((item, i) => {
      const root = find(i);
      if (!groups.has(root)) groups.set(root, []);
      groups.get(root).push(item);
    });

    // 3) 그룹별로 처리: 1개면 계속 표시, 2개 이상이면 2초마다 하나씩 번갈아 표시
    groups.forEach((group) => {
      if (group.length <= 1) {
        group.forEach((it) => (it.labelEl.style.display = ''));
        return;
      }
      let current = 0;
      function showOnly(idx) {
        group.forEach((it, i) => {
          it.labelEl.style.display = i === idx ? '' : 'none';
        });
      }
      showOnly(current);
      const timer = setInterval(() => {
        current = (current + 1) % group.length;
        showOnly(current);
      }, 2000);
      rotationTimers.push(timer);
    });
  }

  // 지도 이동/줌이 끝날 때마다: 글자 크기 갱신 -> 겹침 재계산
  naver.maps.Event.addListener(map, 'idle', () => {
    updateLabelSize();
    // 폰트 크기 변경이 DOM에 반영된 다음 프레임에 겹침 계산
    requestAnimationFrame(() => requestAnimationFrame(resolveOverlaps));
  });

  updateLabelSize();

  const cctvList = [
    { id:'57',  name:'고기동 제1경보국', address:'경기도 용인시 수지구 고기동 229-14' },
    { id:'58',  name:'고기동 제2경보국', address:'경기도 용인시 수지구 고기동 755-37' },
    { id:'62',  name:'고기계곡 제3경보국', address:'경기도 용인시 수지구 고기동 755-45' },
    { id:'63',  name:'고기계곡 제4경보국', address:'경기도 용인시 수지구 고기동 755-37' },
    { id:'73',  name:'동막천-고기계곡', address:'경기도 용인시 수지구 고기동 755' },
    { id:'74',  name:'서분당 IC하부', address:'경기도 용인시 수지구 고기동 755-45' },
    { id:'121', name:'고기교', address:'경기도 용인시 수지구 고기동 755-73' },
    { id:'105', name:'말구리고개-2', address:'경기도 용인시 수지구 고기동 340-7' },
    { id:'33',  name:'말구리고개-1', address:'경기도 용인시 수지구 동천동 687-7' },
    { id:'106', name:'말구리고개-3', address:'경기도 용인시 수지구 동천동 689-73' }
  ];

  const TOTAL_EXPECTED = cctvList.length + 1; // CCTV 10곳 + 학교 1곳
  function onGeocodeSettled() {
    pendingGeocodes++;
    if (pendingGeocodes >= TOTAL_EXPECTED) {
      // 모든 마커가 배치된 뒤 최종적으로 한 번 더 겹침 해소
      requestAnimationFrame(() => requestAnimationFrame(resolveOverlaps));
    }
  }

  // 학교 위치 마커
  naver.maps.Service.geocode({ query: '경기 용인시 수지구 고기동 348-1' }, (status, response) => {
    if (status === naver.maps.Service.Status.OK) {
      const pos = new naver.maps.LatLng(response.v2.addresses[0].y, response.v2.addresses[0].x);
      map.setCenter(pos);
      // 수지꿈학교는 지도 위 마커/이름표로 표시하지 않음 (화면 하단 고정 로고로 대체)
    }
    onGeocodeSettled();
  });

  // CCTV 마커 생성
  cctvList.forEach((cctv, i) => {
    setTimeout(() => {
      naver.maps.Service.geocode({ query: cctv.address }, (status, response) => {
        if (status === naver.maps.Service.Status.OK) {
          const pos = new naver.maps.LatLng(response.v2.addresses[0].y, response.v2.addresses[0].x);
          const link = `http://safe.yongin.go.kr/m/cctv_view.html?cn=${cctv.id}&page=&cd=2&ct=2&ns=`;
          placeMarker(pos, `${cctv.name}<a href="${link}" target="_blank">영상 보기</a>`, false);
        }
        onGeocodeSettled();
      });
    }, i * 250);
  });
</script>
</body>
</html>
