<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>내 주변 와이파이 지도</title>
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=cu551dcr6p&submodules=geocoder"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #map { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // 1. 제공해주신 발급 키 세팅 완료
        const firebaseConfig = {
            apiKey: "AIzaSyDZT_SerkNiSBhVL7hYH7giIFB7qshIqNs",
            authDomain: "wifimap-852eb.firebaseapp.com",
            databaseURL: "https://wifimap-852eb-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "wifimap-852eb",
            storageBucket: "wifimap-852eb.firebasestorage.app",
            messagingSenderId: "237915873972",
            appId: "1:237915873972:web:511d324850f1600f866de1",
            measurementId: "G-BQBBHGTG3X"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. 지도 초기화
        var map = new naver.maps.Map('map', {
            center: new naver.maps.LatLng(37.3214, 127.0609), 
            zoom: 14
        });

        // 3. 현재 위치 GPS 읽기 및 내 위치 마커 표시
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                var lat = position.coords.latitude;
                var lng = position.coords.longitude;
                var currentPos = new naver.maps.LatLng(lat, lng);
                
                map.setCenter(currentPos);
                
                new naver.maps.Marker({
                    position: currentPos,
                    map: map,
                    title: "현재 내 위치",
                    icon: {
                        content: '<div style="width:14px;height:14px;background:red;border-radius:50%;border:2px solid white;box-shadow:0 0 4px rgba(0,0,0,0.5);"></div>',
                        anchor: new naver.maps.Point(7, 7)
                    }
                });
            });
        }

        // 4. Realtime Database에서 와이파이 지점들 가져와 표시
        db.ref('/').once('value').then((snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            data.forEach(item => {
                if (!item) return;

                let placeName = item['설치장소명']; 
                let ssid = item['와이파이SSID'];
                let lat = parseFloat(item['WGS84위도']);
                let lng = parseFloat(item['WGS84경도']);

                if (!isNaN(lat) && !isNaN(lng)) {
                    let marker = new naver.maps.Marker({
                        position: new naver.maps.LatLng(lat, lng),
                        map: map,
                        title: placeName
                    });

                    naver.maps.Event.addListener(marker, 'click', function() {
                        alert("장소: " + placeName + "\nSSID: " + (ssid ? ssid : "정보 없음"));
                    });
                }
            });
        }).catch(error => console.error("데이터 로드 실패:", error));
    </script>
</body>
</html>
