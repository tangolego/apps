name: Deploy to Firebase
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Install functions dependencies
        run: npm install --prefix functions
      
      # 1. Hosting 배포 (cctv-25804 프로젝트로 지정)
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_CCTV }}'
          projectId: cctv-25804
          channelId: live
          
      # 2. Functions 및 Firestore 배포 (프로젝트 ID 및 배포 대상 수정)
      - name: Deploy Functions & Firestore
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_CCTV }}' > /tmp/sa.json
          firebase deploy --only functions,firestore --project cctv-25804 --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
